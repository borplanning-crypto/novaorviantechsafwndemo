<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Novatech LLC — National Distribution & Wholesale Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Page palette ── */
  --bg:       #f5f4f1;
  --bg2:      #eeece7;
  --bg3:      #e6e3dc;
  --dark:     #111210;
  --dark2:    #1c1b18;
  --dark3:    #28271f;

  /* ── Accent: Emerald replaces deep-blue; warm Charcoal/Slate base ── */
  --accent:   #10b981;   /* emerald-500  */
  --accent2:  #34d399;   /* emerald-400  */
  --accent3:  #6ee7b7;   /* emerald-300  */
  --gold:     #d97706;   /* amber-600    */

  --charcoal: #1e2022;
  --slate:    #44433d;
  --slate2:   #7a7870;
  --slate3:   #b0aea5;
  --white:    #ffffff;

  --border:   rgba(17,18,16,0.09);
  --border2:  rgba(16,185,129,0.18);

  --font-display: 'Fraunces', serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'Syne', sans-serif;

  --shadow-sm: 0 2px 14px rgba(17,18,16,0.05);
  --shadow-md: 0 8px 32px rgba(17,18,16,0.09);
  --shadow-lg: 0 20px 56px rgba(17,18,16,0.10);
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--dark);
  overflow-x: hidden;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 76px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw;
  background: transparent;
  transition: all 0.4s ease;
}
nav.scrolled {
  height: 66px;
  background: rgba(14,16,14,0.93);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06);
}
.logo {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
}
.logo-img {
  width: 44px; height: 44px; border-radius: 10px;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.35);
  display: block;
}
.logo-img-fallback {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--dark);
  display: none; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.logo-img-fallback::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent) 0%, transparent 65%);
  opacity: 0.75;
}
.logo-img-fallback span {
  font-family: var(--font-mono); font-size: 13px; font-weight: 800;
  color: var(--white); position: relative; z-index: 1; letter-spacing: -0.5px;
}
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.logo-text .name { font-family: var(--font-mono); font-size: 17px; font-weight: 800; color: var(--white); letter-spacing: -0.3px; }
.logo-text .sub  { font-size: 10px; color: rgba(255,255,255,0.42); letter-spacing: 2px; text-transform: uppercase; font-weight: 400; }

nav ul { list-style: none; display: flex; gap: 2px; align-items: center; }
nav a {
  font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
  color: rgba(255,255,255,0.72); text-decoration: none;
  padding: 8px 15px; border-radius: 8px;
  transition: all 0.2s;
}
nav a:hover { color: var(--white); background: rgba(255,255,255,0.08); }
.nav-cta {
  background: var(--accent) !important; color: var(--white) !important;
  padding: 10px 22px !important; border-radius: 10px !important;
  font-weight: 700 !important;
  box-shadow: 0 4px 18px rgba(16,185,129,0.36) !important;
}
.nav-cta:hover { background: var(--accent2) !important; transform: translateY(-1px) !important; box-shadow: 0 8px 28px rgba(16,185,129,0.48) !important; }

.nav-hamburger {
  display: none; background: none; border: none; cursor: pointer; padding: 6px;
  flex-direction: column; gap: 4px;
}
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }

/* ═══════════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════════ */
@keyframes fadeUp      { from { opacity:0; transform:translateY(36px); } to { opacity:1; transform:none; } }
@keyframes fadeIn      { from { opacity:0; } to { opacity:1; } }
@keyframes shimmer     { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
@keyframes slideInLeft { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:none; } }
@keyframes pulse       { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.35); opacity: 0.65; } }
@keyframes borderPulse { 0%,100% { border-color:rgba(16,185,129,0.3); } 50% { border-color:rgba(16,185,129,0.7); } }
@keyframes bounceY     { 0%,100% { transform:translateY(0); opacity:0.5; } 50% { transform:translateY(5px); opacity:1; } }
@keyframes metricPulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
@keyframes marquee     { from { transform:translateX(0); } to { transform:translateX(-50%); } }

/* ── Ken Burns: slow cinematic scale + drift ── */
@keyframes kenburns-1 {
  0%   { transform: scale(1.0)  translate(0%, 0%); }
  100% { transform: scale(1.15) translate(-2%, -1.5%); }
}
@keyframes kenburns-2 {
  0%   { transform: scale(1.0)  translate(0%, 0%); }
  100% { transform: scale(1.15) translate(2%, -2%); }
}
@keyframes kenburns-3 {
  0%   { transform: scale(1.0)  translate(0%, 0%); }
  100% { transform: scale(1.15) translate(-1.5%, 2%); }
}
@keyframes kenburns-4 {
  0%   { transform: scale(1.0)  translate(0%, 0%); }
  100% { transform: scale(1.15) translate(1%, -1%); }
}

/* ═══════════════════════════════════════════════
   HERO — CINEMATIC KEN BURNS SLIDER
   FIXED: min-height instead of fixed height, better zoom handling,
   no overlap between grid columns, responsive padding.
═══════════════════════════════════════════════ */
.hero {
  position: relative;
  width: 100%;
  min-height: 100vh;          /* CHANGE: was height:100vh -> now min-height ensures content doesn't overlap on zoom */
  overflow-x: hidden;
  display: flex;
  align-items: center;        /* vertically center content, scroll cue remains absolute */
  justify-content: center;
}

/* ── Slider container ── */
.hero-slider {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* ── Each slide: full-size image with Ken Burns running ── */
.hero-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.6s ease;
  will-change: opacity;
  overflow: hidden;
}
.hero-slide.active { opacity: 1; }

.hero-slide img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  transform-origin: center center;
}
.hero-slide.active img {
  animation-duration: 20s;
  animation-timing-function: ease-out;
  animation-fill-mode: forwards;
  animation-iteration-count: 1;
}
.hero-slide:nth-child(1).active img { animation-name: kenburns-1; }
.hero-slide:nth-child(2).active img { animation-name: kenburns-2; }
.hero-slide:nth-child(3).active img { animation-name: kenburns-3; }
.hero-slide:nth-child(4).active img { animation-name: kenburns-4; }

/* ── Dark overlay for text legibility (enhanced for zoom) ── */
.hero-overlay {
  position: absolute; inset: 0; z-index: 1;
  background:
    linear-gradient(to bottom,
      rgba(8,10,8,0.70) 0%,
      rgba(8,10,8,0.40) 38%,
      rgba(8,10,8,0.50) 62%,
      rgba(8,10,8,0.88) 100%),
    linear-gradient(to right,
      rgba(8,10,8,0.75) 0%,
      rgba(8,10,8,0.0) 55%);
}

/* ── Film grain ── */
.hero-grain {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  opacity: 0.038;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── Slide progress dots ── */
.hero-dots {
  position: absolute; bottom: 44px; right: 5vw; z-index: 5;
  display: flex; gap: 8px; align-items: center;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.28);
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
.hero-dot.active {
  background: var(--accent);
  transform: scale(1.5);
}

/* ── Main content grid — ZOOM FRIENDLY: auto columns, robust gaps ── */
.hero-inner {
  position: relative; z-index: 3;
  width: 100%;
  max-width: 1320px;
  margin: 0 auto;
  padding: clamp(100px, 12vh, 160px) 5vw 100px;  /* FIX: adaptive top padding prevents overlap on zoom */
  display: grid;
  grid-template-columns: 1fr minmax(300px, 420px); /* flexible right column */
  gap: 48px;
  align-items: center;
}

/* ── Founder label ── */
.hero-founder-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 14px;
  animation: slideInLeft 0.6s 0s ease both;
}
.hero-founder-label::before {
  content: '';
  display: block; width: 20px; height: 1.5px;
  background: var(--accent2);
}

/* ── Left column ── */
.hero-left { position: relative; }

.hero-chip {
  display: inline-flex; align-items: center; gap: 9px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 100px; padding: 7px 18px 7px 9px;
  font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.78);
  letter-spacing: 0.6px; margin-bottom: 28px;
  animation: slideInLeft 0.7s 0.15s ease both;
}
.hero-chip-dot {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(16,185,129,0.22);
  display: flex; align-items: center; justify-content: center;
}
.hero-chip-dot span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); display: block;
  animation: pulse 2.2s ease infinite;
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(44px, 6vw, 82px);
  line-height: 0.97;
  color: var(--white);
  letter-spacing: -2px;
  margin-bottom: 26px;
  font-weight: 300;
  text-shadow: 0 4px 28px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.4);
  animation: fadeUp 0.75s 0.25s ease both;
}
.hero h1 em {
  font-style: italic;
  color: var(--accent2);
  display: block;
}
.hero h1 strong {
  font-weight: 600; font-style: normal;
  background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.72) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-desc {
  font-size: 16.5px; color: rgba(255,255,255,0.7); line-height: 1.75;
  max-width: 520px; font-weight: 400; margin-bottom: 40px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  animation: fadeUp 0.75s 0.36s ease both;
}

.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; animation: fadeUp 0.75s 0.46s ease both; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--accent); color: var(--white);
  font-family: var(--font-body); font-size: 14px; font-weight: 700;
  padding: 16px 32px; border-radius: 12px;
  text-decoration: none; border: none; cursor: pointer;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 28px rgba(16,185,129,0.42);
  letter-spacing: 0.2px;
}
.btn-primary:hover {
  background: var(--accent2); color: var(--dark); transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(16,185,129,0.52);
}
.btn-primary svg { transition: transform 0.2s; }
.btn-primary:hover svg { transform: translateX(4px); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  color: var(--white);
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  padding: 16px 32px; border-radius: 12px;
  text-decoration: none; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.2s; letter-spacing: 0.2px;
}
.btn-outline:hover {
  background: rgba(255,255,255,0.13);
  border-color: rgba(255,255,255,0.38);
}

/* ── Trust bar / Stats row (responsive grid) ── */
.hero-trust-bar {
  margin-top: 52px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  animation: fadeUp 0.75s 0.58s ease both;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(8,10,8,0.35);
}
.trust-stat {
  padding: 20px 24px;
  border-right: 1px solid rgba(255,255,255,0.08);
  transition: background 0.22s;
}
.trust-stat:last-child { border-right: none; }
.trust-stat:hover { background: rgba(16,185,129,0.06); }
.trust-stat .t-num {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--white);
  line-height: 1;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.trust-stat .t-num span { color: var(--accent2); }
.trust-stat .t-lbl {
  font-size: 10.5px;
  color: rgba(255,255,255,0.38);
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-top: 4px;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

/* ── Right column: glassmorphism dashboard card (no overflow) ── */
.hero-right { animation: fadeUp 0.85s 0.34s ease both; }

.hero-visual {
  background: rgba(10,12,10,0.68);
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 30px 28px;
  position: relative; overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  animation: borderPulse 4s ease infinite;
}
.hero-visual::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(16,185,129,0.16) 0%, transparent 65%);
  pointer-events: none;
}
.hero-visual-label {
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent3); opacity: 0.9;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 18px;
}
.hero-visual-label::before {
  content: ''; display: block; width: 12px; height: 1.5px;
  background: var(--accent3); opacity: 0.7;
}
.hero-visual h3 {
  font-family: var(--font-display); font-size: 22px;
  color: var(--white); line-height: 1.25; font-weight: 300;
  margin-bottom: 20px;
}
.hero-visual h3 em { font-style: italic; color: var(--accent3); }

.hero-metrics {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px;
}
.hero-metric {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; padding: 14px 12px;
  transition: background 0.25s, transform 0.25s;
}
.hero-metric .m-val {
  font-family: var(--font-display); font-size: 26px;
  color: var(--accent3); line-height: 1; font-weight: 600;
  animation: metricPulse 3.5s ease infinite;
}
.hero-metric .m-lbl {
  font-size: 9px; color: rgba(255,255,255,0.34);
  font-weight: 500; margin-top: 5px; letter-spacing: 0.3px;
}
.hero-chart {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 12px;
  margin-bottom: 18px;
}
.hero-chart-label {
  font-size: 9px; font-family: var(--font-mono); font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.26); margin-bottom: 8px;
}
.hero-bars {
  display: flex; align-items: flex-end; gap: 4px; height: 44px;
}
.hero-bar {
  flex: 1; border-radius: 2px 2px 0 0;
  background: rgba(16,185,129,0.2);
  transition: background 0.3s;
}
.hero-bar.active { background: var(--accent2); }
.hero-visual-bottom {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s ease infinite; }
.status-text { font-size: 11px; color: rgba(255,255,255,0.45); }
.uptime-badge {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  background: rgba(16,185,129,0.15); color: var(--accent3);
  padding: 4px 10px; border-radius: 100px;
}
.live-tag { display: inline-flex; align-items: center; gap: 5px; margin-left: 8px; color: #4ade80; font-size: 8px; }

/* Scroll cue (absolute, safe from zoom overlap) */
.hero-scroll-cue {
  position: absolute; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  animation: fadeIn 1.2s 1.2s ease both;
  cursor: pointer;
}
.hero-scroll-cue span {
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.scroll-arrow {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  animation: bounceY 2s ease infinite;
}
.scroll-arrow svg { stroke: rgba(255,255,255,0.55); }

/* ═══════════════════════════════════════════════
   RESPONSIVE: ensure no overlap at any zoom level
═══════════════════════════════════════════════ */
@media (max-width: 1000px) {
  .hero-inner {
    grid-template-columns: 1fr;   /* stack on narrower screens (includes zoom) */
    gap: 32px;
    text-align: center;
  }
  .hero-left { text-align: center; }
  .hero-desc { margin-left: auto; margin-right: auto; }
  .hero-actions { justify-content: center; }
  .hero-trust-bar { max-width: 500px; margin-left: auto; margin-right: auto; }
  .hero-right { max-width: 480px; margin: 0 auto; }
}

@media (max-width: 700px) {
  .hero-trust-bar {
    grid-template-columns: repeat(2, 1fr);
  }
  .trust-stat:nth-child(2) { border-right: none; }
  .trust-stat:nth-child(1), .trust-stat:nth-child(2) { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .hero-visual { padding: 20px; }
  .hero-metrics { gap: 8px; }
  .hero-metric .m-val { font-size: 22px; }
}

@media (max-width: 500px) {
  .hero-trust-bar {
    grid-template-columns: 1fr;
  }
  .trust-stat { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .hero h1 { font-size: 44px; letter-spacing: -1px; }
  .hero-inner { padding-top: 120px; padding-bottom: 70px; }
}

/* The rest of the sections (services, industries, etc.) remain identical to preserve aesthetics */
/* ───────────────────────────────────────────── */
/* (Following sections unchanged to match original design, only zoom fixes applied above) */
/* ... (all original styles for sections below are kept, only hero/zoom issues addressed) ... */

/* ═══════════════════════════════════════════════
   MARQUEE (unchanged)
═══════════════════════════════════════════════ */
.marquee-section {
  background: var(--white);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 26px 0; overflow: hidden;
}
.marquee-track {
  display: flex; gap: 72px; width: max-content;
  animation: marquee 30s linear infinite;
}
.marquee-track:hover { animation-play-state: paused; }
.marquee-item {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--slate2); white-space: nowrap;
  display: flex; align-items: center; gap: 14px;
}
